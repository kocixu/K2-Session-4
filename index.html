<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小畫家：全方位認色</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f8f8f8; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 900, height: 600 },
    backgroundColor: '#ffffff',
    scene: { preload: preload, create: create }
};

const game = new Phaser.Game(config);

const COLORS = {
    red: { text: '紅色', hex: 0xff0000 },
    yellow: { text: '黃色', hex: 0xffff00 },
    green: { text: '綠色', hex: 0x00ff00 },
    blue: { text: '藍色', hex: 0x0000ff },
    orange: { text: '橙色', hex: 0xffa500 },
    purple: { text: '紫色', hex: 0x800080 },
    black: { text: '黑色', hex: 0x333333 },
    white: { text: '白色', hex: 0xeeeeee }
};

const OBJECT_KEYS = ['bottle', 'bag', 'towel', 'paper', 'shoe', 'tissue'];

let brush, mainObject, currentTarget, wordCards = [];
let gameQueue = [], trialCount = 0, scoreText, menuContainer;

function preload() {
    this.load.image('brush', 'assets/brush.png');
    OBJECT_KEYS.forEach(obj => this.load.image(obj, `assets/${obj}.png`));
    
    Object.keys(COLORS).forEach(c => this.load.audio(c + '_vo', `assets/${c}_vo.mp3`));
    this.load.audio('correct', 'assets/correct.mp3');
    this.load.audio('wrong', 'assets/wrong.mp3');
    this.load.audio('congrats', 'assets/congrats.mp3');
}

function create() {
    showLevelMenu(this);
}

function showLevelMenu(scene) {
    menuContainer = scene.add.container(450, 300).setDepth(100);
    let bg = scene.add.rectangle(0, 0, 900, 600, 0x000000, 0.85);
    let title = scene.add.text(0, -100, '請選擇關卡', { fontSize: '40px', fill: '#fff' }).setOrigin(0.5);
    
    let btn1 = createMenuBtn(scene, 0, '第一關 (4色)', () => startSetup(scene, ['red', 'yellow', 'green', 'blue']));
    let btn2 = createMenuBtn(scene, 100, '第二關 (8色)', () => startSetup(scene, Object.keys(COLORS)));
    
    menuContainer.add([bg, title, btn1, btn2]);
}

function createMenuBtn(scene, y, label, cb) {
    let container = scene.add.container(0, y);
    let rect = scene.add.rectangle(0, 0, 300, 70, 0xFFA500).setInteractive().setStrokeStyle(3, 0xffffff);
    let txt = scene.add.text(0, 0, label, { fontSize: '28px', fill: '#fff' }).setOrigin(0.5);
    container.add([rect, txt]);
    rect.on('pointerdown', cb);
    return container;
}

function startSetup(scene, colorKeys) {
    menuContainer.destroy();
    if (scene.sound.context.state === 'suspended') scene.sound.context.resume();

    // CREATE QUEUE: Pairs every color with objects and shuffles
    let tempQueue = [];
    colorKeys.forEach(ckey => {
        tempQueue.push({ color: ckey, obj: Phaser.Utils.Array.GetRandom(OBJECT_KEYS) });
    });
    gameQueue = Phaser.Utils.Array.Shuffle(tempQueue);
    
    // UI Elements
    mainObject = scene.add.image(280, 300, OBJECT_KEYS[0]).setOrigin(0.5);
    createWordPalette(scene, colorKeys);

    // BIGGER BRUSH for 5yo fingers
    brush = scene.add.image(780, 500, 'brush').setDisplaySize(160, 160).setDepth(20).setInteractive();
    brush.setData('startX', 780).setData('startY', 500);
    
    scoreText = scene.add.text(450, 40, `進度: 0 / ${gameQueue.length}`, { fontSize: '28px', fill: '#333', fontWeight: 'bold' }).setOrigin(0.5);

    scene.input.setDraggable(brush);
    scene.input.on('drag', (p, obj, dx, dy) => { 
        obj.x = dx; 
        obj.y = dy - 50; // Offset so finger doesn't cover the brush head
    });
    scene.input.on('dragend', (p, obj) => checkAnswer(scene, obj));

    next
